    <script>
      (function () {
        var s = localStorage.getItem('theme');
        var h = new Date().getHours();
        if (s === 'dark' || (!s && (h < 8 || h >= 19))) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
